name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version commit + tags
  pull-requests: write # open/update the "Version Packages" PR

jobs:
  release:
    name: version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs history to diff against the base

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # When changesets exist, this opens/updates a "Version Packages" PR.
      # When that PR is merged (no changesets left, versions already bumped),
      # the same job publishes instead. `pnpm run release` runs build first.
      - uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
